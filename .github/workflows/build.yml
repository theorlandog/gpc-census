name: build

on:
  push:
    branches: [main]
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  pull_request:
  workflow_dispatch:

# Least privilege via per-job permissions blocks; only the release job
# elevates (contents, id-token, attestations). No workflow-level block:
# the one run that combined a workflow-level block with the release
# job's own block had its release publish rejected with a 403.
env:
  UV_VERSION: 0.11.26

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        run: |
          curl -LsSf "https://astral.sh/uv/${UV_VERSION}/install.sh" | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install dependencies
        run: uv sync --locked
      - name: Run tests
        run: uv run pytest
      - name: Lint
        run: uv run ruff check

  version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Compute build version
        id: compute
        run: |
          base="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' pyproject.toml)"
          sha="$(git rev-parse --short=8 HEAD)"
          case "$GITHUB_REF" in
            refs/tags/v*)    version="${GITHUB_REF#refs/tags/v}" ;;
            refs/heads/main) version="${base}+main.${sha}" ;;
            *)               version="${base}+git.${sha}" ;;
          esac
          echo "version=${version}" | tee -a "$GITHUB_OUTPUT"

  # PR-only build validation. No artifact uploads: upload-artifact has
  # no node24 release yet and run artifacts cannot be uploaded with gh;
  # the release job rebuilds everything it publishes anyway.
  pypi-package:
    if: github.event_name == 'pull_request'
    needs: [test, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        run: |
          curl -LsSf "https://astral.sh/uv/${UV_VERSION}/install.sh" | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Stamp version
        run: uv version "${{ needs.version.outputs.version }}"
      - name: Build wheel and sdist
        run: uv build

  report:
    if: github.event_name == 'pull_request'
    needs: [test, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Install uv
        run: |
          curl -LsSf "https://astral.sh/uv/${UV_VERSION}/install.sh" | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Stamp version
        run: uv version "${{ needs.version.outputs.version }}"
      - name: Build report
        run: make report

  release:
    if: >-
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    needs: [test, version]
    # No job container: the runner's podman drives both containers (the
    # Fedora RPM build and the pinned pandoc image for the report), so
    # nothing nests and nothing needs privileges. gh, zip, and podman
    # are preinstalled on the runner.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    concurrency:
      group: release-${{ github.ref }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        run: |
          curl -LsSf "https://astral.sh/uv/${UV_VERSION}/install.sh" | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Stamp version
        run: uv version "${{ needs.version.outputs.version }}"
      - name: Build wheel and sdist
        run: uv build
      - name: Build report and assemble data output
        run: |
          make report
          mkdir -p data-output
          cp results/report/main.pdf data-output/
          cp -r results/data data-output/data
      - name: Attest data output files
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: data-output/**
      - name: Zip data output with its attestation
        run: |
          cp "${{ steps.attest.outputs.bundle-path }}" data-output/attestation.sigstore.json
          (cd data-output && find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS)
          zip -r data-output.zip data-output
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          files="$(find dist -maxdepth 1 -type f \( -name '*.whl' -o -name '*.tar.gz' \); \
                   echo data-output.zip)"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              gh release create "$tag" --title "$tag" --latest --generate-notes $files
            else
              # Suffixed tag (e.g. v1.0.2rc1): starts as a pre-release and is
              # promoted to a release manually.
              gh release create "$tag" --title "$tag" --prerelease --generate-notes $files
            fi
          else
            # Rolling pre-release tracking the tip of main. Immutable
            # releases reserve a published tag name forever, so each snapshot
            # gets a fresh per-commit tag and older snapshots (including any
            # orphaned drafts) are pruned after the new one is live.
            tag="snapshot-${GITHUB_SHA:0:8}"
            gh release create "$tag" --target "$GITHUB_SHA" --prerelease \
              --title "snapshot (${GITHUB_SHA:0:8})" \
              --notes "Rolling build of the main branch at ${GITHUB_SHA}." $files
            gh release list --limit 100 --json tagName --jq '.[].tagName' \
              | grep '^snapshot' | grep -vx "$tag" \
              | while read -r old; do
                  gh release delete "$old" --yes --cleanup-tag || true
                done
          fi
